<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlaw Social | Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="vh-100 d-flex justify-content-center align-items-center"
    style="background-image: url('./src/old-town-western-aesthetic-87otv3nnofq978zj.jpg'); background-size: cover; background-position: center;">

    <div class="card p-4 col-11 col-sm-10 col-md-8 col-lg-5 text-center mt-5 mb-5 shadow-lg"
        style="--bs-bg-opacity: 0.9;">
        <h2>Procura-se!!!</h2>

        <div class="d-flex justify-content-center mb-3">
            <img src="./src/9e0cbb92-d58d-4879-9044-2f6f15a74b6d-removebg-preview.png" alt="Logo Outlaw Social"
                class="img-fluid" style="max-width: 150px;">
        </div>

        <p class="text-muted">Preencha o cartaz para entrar na gangue.</p>

        <form
            onsubmit="event.preventDefault(); alert('Registrado! Agora faça login.'); window.location.href='login.html';">
            <div class="row">
                <div class="col-md-6 mb-3 text-start">
                    <label class="form-label fw-bold">Alcunha (Usuário)</label>
                    <input type="text" class="form-control" required placeholder="Ex: Arthur Morgan">
                </div>
                <div class="col-md-6 mb-3 text-start">
                    <label class="form-label fw-bold">Correio (Email)</label>
                    <input type="email" class="form-control" required placeholder="email@correio.com">
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold">Senha de Honra</label>
                <input type="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-rdr w-100 mb-3 btn-lg">Assinar o Bando</button>
            <a href="login.html" class="text-decoration-none text-danger fw-bold">Já é procurado? Faça login.</a>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>

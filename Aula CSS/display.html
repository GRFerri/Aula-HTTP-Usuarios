<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <link rel="stylesheet" href="style-display.css">
</head>
<body>
    <h1>Exemplos de Display</h1>
    
    <h2>Display: Block</h2>
    <div class="block">
        <p>Olá</p>
    </div>
    
    <h2>Display: Inline</h2>
    <div class="inline">
        <p>Salve</p>
    </div>
    
    <h2>Display: Inline-Block</h2>
    <div class="inline-block">
        <p>Boa noite</p>
    </div>
</body>
</html>
